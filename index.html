<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COSMOS Billiards Taraz</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(85, 112, 255, .35), transparent 35%),
        radial-gradient(circle at 90% 20%, rgba(0, 255, 180, .14), transparent 30%),
        linear-gradient(180deg, #060713 0%, #02030a 65%, #000 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 80%);
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      position: sticky;
      top: 12px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      background: rgba(5, 7, 18, .72);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #fff, #9fb2ff);
      color: #02030a;
      font-weight: 950;
      box-shadow: 0 0 28px rgba(120,150,255,.5);
    }

    .brand-title {
      font-weight: 950;
      letter-spacing: 1px;
      font-size: 18px;
    }

    .brand-sub {
      color: #9da8d7;
      font-size: 12px;
      margin-top: 2px;
    }

    .nav {
      display: flex;
      gap: 8px;
    }

    .nav a {
      padding: 10px 13px;
      border-radius: 999px;
      color: #dfe5ff;
      background: rgba(255,255,255,.06);
      font-size: 13px;
      font-weight: 800;
    }

    .hero {
      min-height: 620px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 24px;
      align-items: center;
      padding: 54px 0 34px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(120,150,255,.12);
      border: 1px solid rgba(160,180,255,.22);
      color: #bfcaff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(46px, 8vw, 96px);
      line-height: .88;
      letter-spacing: -4px;
      text-transform: uppercase;
    }

    .blue {
      color: #9fb2ff;
      text-shadow: 0 0 34px rgba(120,150,255,.6);
    }

    .hero-text {
      margin-top: 22px;
      max-width: 620px;
      color: #c8cff0;
      font-size: 18px;
      line-height: 1.65;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      min-height: 52px;
      padding: 15px 18px;
      border-radius: 17px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 950;
      transition: .2s;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-main {
      background: linear-gradient(135deg, #6f8cff, #b8c7ff);
      color: #030613;
      box-shadow: 0 0 35px rgba(120,150,255,.32);
    }

    .btn-wa {
      background: linear-gradient(135deg, #22d060, #087f38);
      color: white;
    }

    .btn-dark {
      background: rgba(255,255,255,.07);
      color: white;
    }

    .btn-ig {
      background: linear-gradient(135deg, #c13584, #e1306c, #f56040, #ffdc80);
      color: white;
      box-shadow: 0 0 28px rgba(225,48,108,.28);
    }

    .btn-tt {
      background: linear-gradient(135deg, #010101, #1a1a2e);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 0 28px rgba(0,0,0,.4);
      position: relative;
      overflow: hidden;
    }

    .btn-tt::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(105,201,208,.15), rgba(254,44,85,.15));
      pointer-events: none;
    }

    .hero-card {
      position: relative;
      min-height: 520px;
      border-radius: 38px;
      padding: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.03)),
        radial-gradient(circle at 50% 0%, rgba(100,125,255,.35), transparent 45%);
      box-shadow: 0 35px 90px rgba(0,0,0,.5);
    }

    .table {
      height: 270px;
      border-radius: 34px;
      background:
        radial-gradient(circle at center, rgba(22, 175, 123, .85), rgba(5, 75, 55, .9) 60%, #01281e);
      border: 16px solid #12131d;
      box-shadow:
        inset 0 0 40px rgba(0,0,0,.55),
        0 30px 70px rgba(0,0,0,.5);
      position: relative;
      margin-top: 58px;
      transform: perspective(720px) rotateX(10deg);
    }

    .ball {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px rgba(255,255,255,.65);
    }

    .ball.one { left: 25%; top: 34%; background: #f5c542; }
    .ball.two { left: 52%; top: 45%; background: #fff; }
    .ball.three { left: 67%; top: 30%; background: #1b55ff; }
    .ball.four { left: 75%; top: 63%; background: #df243c; }

    .cue {
      position: absolute;
      width: 260px;
      height: 5px;
      background: linear-gradient(90deg, #d9bd87, #6b4321);
      border-radius: 99px;
      right: -40px;
      top: 160px;
      transform: rotate(-24deg);
      box-shadow: 0 0 22px rgba(255,255,255,.2);
    }

    .floating {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-card {
      padding: 16px;
      border-radius: 22px;
      background: rgba(2, 3, 10, .72);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(14px);
    }

    .mini-card span {
      color: #8fa1ff;
      font-size: 12px;
      font-weight: 900;
    }

    .mini-card b {
      display: block;
      margin-top: 6px;
      font-size: 20px;
    }

    .section {
      padding: 34px 0;
    }

    .section-head
